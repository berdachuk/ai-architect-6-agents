site_name: ai-architect-6-agents Documentation
site_description: >-
  Agentic AI — orchestrator and sub-agents for weather and news via MCP,
  Spring AI patterns, memory, and evaluation.
site_author: ai-architect-6-agents
site_url: https://berdachuk.github.io/ai-architect-6-agents/

repo_name: berdachuk/ai-architect-6-agents
repo_url: https://github.com/berdachuk/ai-architect-6-agents
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Siarhei Berdachuk

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - plantuml_markdown:
      server: https://www.plantuml.com/plantuml
      cachedir: .plantuml-cache
      format: svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - User guide: USER-GUIDE.md
  - Submission: submission/README.md
  - PRD: PRD.md
  - Project Vision: VISION.md
  - Architecture: ARCHITECTURE.md
  - Implementation plan (WBS): IMPLEMENTATION-PLAN-WBS.md
  - Work scenarios: WORK-SCENARIOS.md
  - Use cases (catalogue): USE-CASES.md
  - Evaluation methodology: EVALUATION-METHODOLOGY.md
  - User stories: USER-STORIES.md
  - Forms and workflows: FORMS-AND-FLOWS.md
  - Wireframes: WIREFRAMES.md
  - AI context strategy: ai-context-strategy.md
  - Docs agent guide: AGENTS.md

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/berdachuk/ai-architect-6-agents

extra_css:
  - stylesheets/extra.css
